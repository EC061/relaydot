name: relaydot

services:
  controller:
    image: ${RELAYDOT_IMAGE:-ghcr.io/ec061/relaydot-controller:latest}
    environment:
      RELAYDOT_ADMIN_TOKEN: ${RELAYDOT_ADMIN_TOKEN:?set RELAYDOT_ADMIN_TOKEN}
      RELAYDOT_DATABASE_PATH: /app/data/relaydot.db
    ports:
      - "${RELAYDOT_BIND_ADDRESS:-127.0.0.1}:${RELAYDOT_PORT:-3000}:3000"
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - controller-data:/app/data

volumes:
  controller-data:
    name: relaydot-controller-data

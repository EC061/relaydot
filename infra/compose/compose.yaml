services:
  controller:
    image: ${RELAYDOT_IMAGE:-ghcr.io/ec061/relaydot-controller:latest}
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      RELAYDOT_ADMIN_TOKEN: ${RELAYDOT_ADMIN_TOKEN:?set RELAYDOT_ADMIN_TOKEN}
      RELAYDOT_DATABASE_PATH: /app/data/relaydot.db
      RELAYDOT_HOST: 0.0.0.0
      RELAYDOT_PORT: 3000
    ports:
      - "${RELAYDOT_BIND_ADDRESS:-0.0.0.0}:${RELAYDOT_PORT:-3000}:3000"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - controller-data:/app/data

volumes:
  controller-data:

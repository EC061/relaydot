services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: relaydot
      POSTGRES_USER: relaydot
      POSTGRES_PASSWORD: relaydot-development-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relaydot"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
  webdav:
    image: hacdias/webdav:v5.8.0
    volumes:
      - webdav-data:/data
volumes:
  postgres-data:
  webdav-data:

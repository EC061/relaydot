apiVersion: relaydot.dev/v1alpha1
kind: SyncPolicy
metadata:
  name: full-mirror-retain-forever
  annotations:
    relaydot.dev/mode: current-user-choice
    relaydot.dev/note: >-
      Current policy: keep every regular file on every trusted machine, propagate
      additions and changes, never propagate permanent deletion, and retain all
      encrypted revisions forever. This intentionally includes credentials and
      application state and can be narrowed later.
spec:
  enforcedApplicationSettings:
    claude:
      cleanupPeriodDays: 36500
    codex:
      history.persistence: save-all
  retention:
    revisions: forever
    tombstones: forever
    garbageCollection: disabled
  behavior:
    deletionPolicy: archive-and-restore
    deleteExcluded: false
    includeHidden: true
    preserveSymlinks: true
    followSymlinkTargets: false
    regularFilesOnly: true
    conflictStrategy: preserve_both_and_pause_path
    secretScan: report
    encryptionRequired: end-to-end
    maxFileSize: unlimited
  roots:
    - name: claude-full
      path: ~/.claude
      classification: full-application-state
      syncMode: hybrid-full-mirror
      include:
        - /**
    - name: claude-global-state
      path: "~"
      classification: full-application-state
      syncMode: atomic-file
      include:
        - /.claude.json
    - name: codex-full
      path: ~/.codex
      classification: full-application-state
      syncMode: hybrid-full-mirror
      include:
        - /**
    - name: agents-full
      path: ~/.agents
      optional: true
      classification: full-application-state
      syncMode: hybrid-full-mirror
      include:
        - /**

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Documentation and deployment file checks
        run: pnpm check:docs
      - name: OpenAPI contract
        run: pnpm lint:contracts
      - name: Deployment script checks
        run: pnpm check:deployment
      - name: Production Compose configuration
        env:
          RELAYDOT_ADMIN_TOKEN: ci-validation-token
        run: docker compose -f infra/compose/compose.yaml config --quiet
      - name: Local-build Compose overlay
        env:
          RELAYDOT_ADMIN_TOKEN: ci-validation-token
        run: docker compose -f infra/compose/compose.yaml -f infra/compose/compose.build.yaml config --quiet
      - name: Type check
        run: pnpm lint:controller
      - name: Tests and coverage
        run: pnpm test:controller
      - name: Production build
        run: pnpm build:controller

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.11
        run: uv python install 3.11
      - name: Sync locked environment
        working-directory: agent
        run: uv sync --all-groups --locked --python 3.11
      - name: Lint
        working-directory: agent
        run: uv run ruff check .
      - name: Format check
        working-directory: agent
        run: uv run ruff format --check .
      - name: Type check
        working-directory: agent
        run: uv run mypy src
      - name: Tests and branch coverage
        working-directory: agent
        run: uv run pytest --cov=relaydot --cov-report=term-missing
      - name: Build release distributions
        working-directory: agent
        run: uv build --no-sources
      - name: Smoke test wheel
        working-directory: agent
        run: uv run --isolated --no-project --with dist/*.whl python tests/smoke_package.py
      - name: Smoke test source distribution
        working-directory: agent
        run: uv run --isolated --no-project --with dist/*.tar.gz python tests/smoke_package.py

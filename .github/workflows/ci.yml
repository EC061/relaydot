name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.11
        run: uv python install 3.11
      - name: Sync locked environment
        working-directory: agent
        run: uv sync --all-groups --locked --python 3.11
      - name: Lint
        working-directory: agent
        run: uv run ruff check .
      - name: Format check
        working-directory: agent
        run: uv run ruff format --check .
      - name: Type check
        working-directory: agent
        run: uv run mypy src
      - name: Tests and branch coverage
        working-directory: agent
        run: uv run pytest --cov=relaydot --cov-report=term-missing

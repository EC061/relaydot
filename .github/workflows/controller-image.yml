name: Controller image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: controller-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        name: Normalize the GHCR image name
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/relaydot-controller" >> "$GITHUB_OUTPUT"
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
      - if: github.event_name != 'pull_request'
        name: Smoke-test the published controller
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          tag="sha-${GITHUB_SHA::7}"
          docker pull "${IMAGE_NAME}:${tag}"
          docker run --detach --rm \
            --name relaydot-controller-smoke \
            --publish 127.0.0.1:3000:3000 \
            --env RELAYDOT_ADMIN_TOKEN=ci-smoke-token \
            "${IMAGE_NAME}:${tag}"
          trap 'docker logs relaydot-controller-smoke; docker stop relaydot-controller-smoke' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/v1/health \
              | grep --quiet '"journal_mode":"wal"'; then
              exit 0
            fi
            sleep 1
          done
          exit 1
